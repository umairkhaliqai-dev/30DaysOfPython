<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Website{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- This is the NAVIGATION MENU (appears on EVERY page) -->
    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>

    <!-- This is where UNIQUE content goes -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- This is FOOTER (appears on EVERY page) -->
    <footer>
        © 2026 My Website
    </footer>

</body>
</html>
